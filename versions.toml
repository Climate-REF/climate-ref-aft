# Climate REF AFT Version Manifest
#
# This file pins the exact versions of all Climate REF components
# that make up a given AFT release. The CI workflows read this file
# to install the correct combination for integration testing.

[aft]
version = "0.4.0"

[components]
# Core framework (from Climate-REF/climate-ref monorepo)
climate-ref-core = "0.16.2"
climate-ref = "0.16.2"
climate-ref-celery = "0.16.2"

# Diagnostic providers
climate-ref-esmvaltool = "0.16.2"
climate-ref-pmp = "0.16.2"
climate-ref-ilamb = "0.16.2"

[frontend]
# API + frontend container image (Climate-REF/ref-app).
# Deployed via helm api.image.tag and docker-compose ref-app.
climate-ref-frontend = "0.4.0"

[helm]
# Chart version tracks the AFT repo version
chart-version = "0.4.0"
# App version tracks the climate-ref core version
app-version = "0.16.2"
