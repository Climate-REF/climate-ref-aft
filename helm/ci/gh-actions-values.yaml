api:
  env:
    SECRET_KEY: ci-test-secret
    # Diagnostic providers (climate_ref_ilamb / esmvaltool) create config
    # dirs under $HOME at import time, which fails with the api's
    # readOnlyRootFilesystem unless HOME points at a writable mount.
    HOME: /tmp
  volumes:
  - name: gha-cached
    hostPath:
      path: /cache/ref-config
  - name: tmp
    emptyDir: {}
  volumeMounts:
  - name: gha-cached
    mountPath: /ref
    readOnly: true
  - name: tmp
    mountPath: /tmp

service:
  type: NodePort

flower:
  podSecurityContext:
    runAsUser: 1000

defaults:
  podSecurityContext:
    runAsUser: 1000
  volumes:
  - name: gha-cached
    hostPath:
      path: /cache/ref-config
  - name: tmp
    emptyDir: {}
  volumeMounts:
  - name: gha-cached
    mountPath: /ref
    readOnly: false
  - name: tmp
    mountPath: /tmp
    readOnly: false

dragonfly:
  extraArgs:
  - --proactor_threads=1
  - --maxmemory=256mb
