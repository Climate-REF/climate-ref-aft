{{- range $provider, $spec := (omit .Values.providers "defaults") -}}
{{- $spec := merge (deepCopy $.Values.defaults) $spec -}}
{{- $args := list "celery" "start-worker" "--loglevel" "DEBUG" -}}
{{- if ne $provider "orchestrator" -}} {{- $args = concat $args (list "--provider" $provider) -}} {{- end -}}
{{- /* Celery worker options passed after the `--` separator (e.g. --concurrency, --pool). */ -}}
{{- $workerArgs := list -}}
{{- if $spec.concurrency -}} {{- $workerArgs = append $workerArgs (printf "--concurrency=%v" $spec.concurrency) -}} {{- end -}}
{{- with $spec.extraArgs -}} {{- $workerArgs = concat $workerArgs . -}} {{- end -}}
{{- if $workerArgs -}} {{- $args = concat $args (list "--") $workerArgs -}} {{- end -}}
{{- /* Chart-managed esmvaltool config: auto-mount when providers.esmvaltool.config is set. */ -}}
{{- $volumes := $spec.volumes | default list -}}
{{- $volumeMounts := $spec.volumeMounts | default list -}}
{{- if and (eq $provider "esmvaltool") $spec.config -}}
  {{- $volumeMounts = append $volumeMounts (dict "name" "esmvaltool-config" "mountPath" "/etc/esmvaltool" "readOnly" true) -}}
  {{- $volumes = append $volumes (dict "name" "esmvaltool-config" "configMap" (dict "name" (printf "%s-esmvaltool-config" (include "ref.fullname" $)))) -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ref.fullname" $ }}-{{ $provider }}
  {{- with $spec.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/component: {{ $provider }}
    {{- include "ref.labels" $ | nindent 4 }}
spec:
  {{- if not (and $spec.autoscaling $spec.autoscaling.enabled) }}
  replicas: {{ $spec.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: {{ $provider }}
      {{- include "ref.selectorLabels" $ | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/providers/secret.yaml") $ | sha256sum }}
      {{- with $spec.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/component: {{ $provider }}
        {{- include "ref.labels" $ | nindent 8 }}
        {{- with $spec.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ref.fullname" $ }}-{{ $provider }}
      {{- with $spec.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ $provider }}
        {{- with $spec.securityContext }}
        securityContext:
          {{- toYaml . | nindent 12 }}
        {{- end }}
        image: "{{ $spec.image.repository }}:{{ $spec.image.tag }}"
        imagePullPolicy: {{ $spec.image.pullPolicy }}
        args:
        {{- toYaml $args | nindent 8 }}
        envFrom:
        - secretRef:
            name: {{ include "ref.fullname" $ }}-{{ $provider }}
        {{- with $spec.resources }}
        resources:
          {{- toYaml . | nindent 12 }}
        {{- end }}
        {{- with $volumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $volumes }}
      volumes:
        {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with $spec.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $spec.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $spec.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{ end -}}
