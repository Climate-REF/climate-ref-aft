{{- $esmvaltool := index .Values.providers "esmvaltool" -}}
{{- if and $esmvaltool $esmvaltool.config -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ref.fullname" . }}-esmvaltool-config
  labels:
    app.kubernetes.io/component: esmvaltool
    {{- include "ref.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- toYaml $esmvaltool.config | nindent 4 }}
{{- end -}}
